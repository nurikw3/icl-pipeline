<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ title or "ICL Runner" }}</title>
    <style>
        :root {
            --bg: #f7f7f4;
            --panel: #ffffff;
            --ink: #18181b;
            --muted: #666a73;
            --line: #d8dbdf;
            --line-strong: #b9bec7;
            --blue: #1d4ed8;
            --green: #047857;
            --orange: #c2410c;
            --red: #b91c1c;
            --shadow: 0 1px 2px rgba(15, 23, 42, 0.06);
        }

        * {
            box-sizing: border-box;
        }

        body {
            background: var(--bg);
            color: var(--ink);
            font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            line-height: 1.45;
            margin: 0;
            padding: 0;
        }

        header {
            background: var(--ink);
            border-bottom: 1px solid #000;
            color: #fff;
        }

        header a {
            color: #fff;
            font-weight: 700;
            text-decoration: none;
        }

        .topbar {
            align-items: center;
            display: flex;
            justify-content: space-between;
            margin: 0 auto;
            max-width: 1440px;
            min-height: 60px;
            padding: 14px 24px;
        }

        main {
            margin: 0 auto;
            max-width: 1440px;
            padding: 24px;
        }

        .card {
            background: var(--panel);
            border: 1px solid var(--line);
            border-radius: 8px;
            box-shadow: var(--shadow);
            margin-bottom: 20px;
            padding: 20px;
        }

        h1, h2, h3, p {
            overflow-wrap: anywhere;
        }

        h1, h2, h3 {
            margin-top: 0;
        }

        h1 {
            font-size: 28px;
            line-height: 1.15;
            margin-bottom: 8px;
        }

        h2 {
            font-size: 20px;
        }

        h3 {
            font-size: 15px;
            margin-bottom: 12px;
        }

        form {
            margin: 0;
        }

        label {
            color: #30343b;
            display: inline-block;
            font-size: 13px;
            font-weight: 650;
            margin-bottom: 6px;
        }

        input, select, textarea {
            background: #fff;
            border: 1px solid var(--line-strong);
            border-radius: 6px;
            color: var(--ink);
            font: inherit;
            min-height: 40px;
            padding: 8px 10px;
            width: 100%;
        }

        input[type="checkbox"] {
            height: 16px;
            margin: 0;
            min-height: 0;
            width: 16px;
        }

        input:focus, select:focus, textarea:focus, button:focus, a.button:focus {
            outline: 2px solid #93c5fd;
            outline-offset: 2px;
        }

        button {
            background: var(--blue);
            border: none;
            border-radius: 6px;
            color: #fff;
            cursor: pointer;
            font: inherit;
            font-weight: 700;
            min-height: 40px;
            padding: 10px 16px;
        }

        button.secondary {
            background: #525866;
        }

        button.danger {
            background: var(--red);
        }

        a.button {
            background: var(--blue);
            border-radius: 6px;
            color: #fff;
            display: inline-block;
            font-size: 14px;
            font-weight: 700;
            margin: 4px 4px 4px 0;
            min-height: 38px;
            padding: 9px 14px;
            text-align: center;
            text-decoration: none;
        }

        a.button.gray {
            background: #525866;
        }

        a.button.green {
            background: var(--green);
        }

        a.button.orange {
            background: var(--orange);
        }

        .status {
            border-radius: 999px;
            display: inline-block;
            font-size: 13px;
            font-weight: 700;
            padding: 4px 10px;
        }

        .status.running { background: #fef3c7; color: #92400e; }
        .status.evaluating { background: #dbeafe; color: #1e40af; }
        .status.finished { background: #dcfce7; color: #166534; }
        .status.failed { background: #fee2e2; color: #991b1b; }
        .status.eval_failed { background: #fee2e2; color: #991b1b; }
        .status.queued { background: #e0e7ff; color: #3730a3; }
        .status.interrupted { background: #f3f4f6; color: #374151; }

        table {
            background: #fff;
            border-collapse: collapse;
            font-size: 14px;
            min-width: 720px;
            width: 100%;
        }

        th {
            background: var(--ink);
            color: #fff;
            padding: 10px;
            position: sticky;
            text-align: left;
            top: 0;
            z-index: 1;
        }

        td {
            border-bottom: 1px solid #e5e7eb;
            overflow-wrap: anywhere;
            padding: 9px 10px;
            vertical-align: top;
        }

        tr:hover {
            background: #f9fafb;
        }

        .table-wrap {
            border: 1px solid var(--line);
            border-radius: 8px;
            max-height: 78vh;
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
        }

        pre {
            background: #111827;
            border-radius: 8px;
            color: #e5e7eb;
            font-size: 13px;
            line-height: 1.45;
            overflow-wrap: anywhere;
            overflow-x: auto;
            padding: 14px;
            white-space: pre-wrap;
        }

        details {
            border-top: 1px solid #eceef2;
            margin: 10px 0;
            padding-top: 10px;
        }

        summary {
            color: var(--blue);
            cursor: pointer;
            font-weight: 700;
        }

        .small {
            color: var(--muted);
            font-size: 13px;
        }

        .grid {
            display: grid;
            gap: 16px;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
        }

        .mono {
            font-family: Menlo, Consolas, monospace;
            font-size: 13px;
        }

        .page-head {
            align-items: flex-start;
            display: flex;
            gap: 16px;
            justify-content: space-between;
            margin-bottom: 16px;
        }

        .actions {
            align-items: center;
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .actions .button,
        .actions button {
            margin: 0;
        }

        .form-section {
            border-top: 1px solid var(--line);
            padding-top: 18px;
        }

        .form-section:first-child {
            border-top: none;
            padding-top: 0;
        }

        .form-section-title {
            color: #111827;
            font-size: 14px;
            font-weight: 800;
            margin: 0 0 12px;
            text-transform: uppercase;
        }

        .field-grid {
            display: grid;
            gap: 14px 16px;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
        }

        .field {
            min-width: 0;
        }

        .field .small {
            margin-top: 6px;
        }

        .check-grid {
            display: grid;
            gap: 8px 14px;
            grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
        }

        .check-option {
            align-items: center;
            border: 1px solid var(--line);
            border-radius: 6px;
            display: flex;
            gap: 8px;
            margin: 0;
            min-height: 40px;
            padding: 10px;
        }

        .check-option[aria-disabled="true"] {
            background: #f4f5f7;
            color: #8b9099;
        }

        .stack {
            display: grid;
            gap: 20px;
        }

        .path-text {
            overflow-wrap: anywhere;
        }

        .run-meta {
            display: grid;
            gap: 8px;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
        }

        .record-head {
            align-items: flex-start;
            display: flex;
            gap: 12px;
            justify-content: space-between;
        }

        .record-head h3 {
            margin-bottom: 0;
        }

        .config-dump,
        .log-dump {
            max-height: 65vh;
        }

        @media (max-width: 720px) {
            .topbar {
                padding: 12px 16px;
            }

            main {
                padding: 16px 12px;
            }

            .card {
                padding: 16px;
            }

            .page-head,
            .record-head {
                display: block;
            }

            .actions {
                display: grid;
                grid-template-columns: 1fr;
                margin-top: 12px;
            }

            .actions .button,
            .actions button {
                width: 100%;
            }

            .field-grid,
            .grid,
            .check-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
<header>
    <div class="topbar">
        <a href="/">ICL Experiment Runner</a>
    </div>
</header>
<main>
    {% block content %}{% endblock %}
</main>
</body>
</html>
